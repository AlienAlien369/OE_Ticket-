services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oe_ticket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oe_ticket_db
      POSTGRES_USER: oe_ticket_user
      POSTGRES_PASSWORD: oe_ticket_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oe_ticket_user -d oe_ticket_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── .NET Core API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oe_ticket_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Host=postgres;Port=5432;Database=oe_ticket_db;
        Username=oe_ticket_user;Password=oe_ticket_pass
      Jwt__Secret: "OETicket_SuperSecretKey_32Chars_Min!"
      Jwt__Issuer: "OETicketAPI"
      Jwt__Audience: "OETicketClient"
      Jwt__ExpiryMinutes: "480"
      AllowedOrigins__0: "http://localhost:3000"
      AllowedOrigins__1: "http://frontend:80"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are build-time ARGs (Vite bakes them into the JS bundle).
        # VITE_API_BASE_URL is relative (/api/v1) so nginx proxies to the api service.
        VITE_API_BASE_URL: /api/v1
        VITE_ENABLE_MOCKS: "false"
        VITE_APP_VERSION: "1.0.0"
    container_name: oe_ticket_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
    name: oe_ticket_postgres_data
