<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Nexus — The modern enterprise platform for high-growth teams." />
    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Nexus — Enterprise Platform</title>
    <!-- Inline critical CSS to prevent FOUC -->
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; background: #fff; }
      .dark body { background: #050810; }
    </style>
    <!-- Theme initialization script (prevents flash) -->
    <script>
      (function () {
        try {
          var theme = JSON.parse(localStorage.getItem('nexus-theme') || '{}');
          var mode = theme?.state?.mode || 'system';
          var resolved = mode === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : mode;
          document.documentElement.classList.add(resolved);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
